<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanvibe - Feel The Future of Music</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #e5e7eb;
            overflow: hidden; /* Prevent body scroll, handle internally */
        }

        /* Custom Scrollbar */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -4px;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
        }
        input[type=range]:hover::-webkit-slider-thumb {
            opacity: 1;
            transform: scale(1.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #374151; /* gray-700 */
            border-radius: 9999px;
        }
        
        /* Dynamic Range Track Color */
        .range-slider-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .range-fill {
            position: absolute;
            height: 4px;
            background: linear-gradient(to right, #06b6d4, #a855f7); /* cyan to purple */
            border-radius: 9999px;
            pointer-events: none;
        }
        .volume-fill {
            position: absolute;
            height: 4px;
            background: #ffffff;
            border-radius: 9999px;
            pointer-events: none;
            transition: background 0.3s;
        }
        .volume-container:hover .volume-fill {
            background: #22d3ee; /* cyan-400 */
        }

        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Animations */
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        .animate-aurora {
            animation: pulse-slow infinite alternate;
        }

        .waveform-bar {
            width: 4px;
            background-color: #22d3ee;
            border-radius: 2px 2px 0 0;
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce {
            0% { height: 4px; }
            100% { height: 100%; }
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col selection:bg-cyan-500/30 text-gray-200">

    <!-- Background Engine -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-purple-900/40 rounded-full blur-[120px] mix-blend-screen animate-aurora" style="animation-duration: 8s"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-cyan-900/30 rounded-full blur-[150px] mix-blend-screen animate-aurora" style="animation-duration: 12s; animation-delay: 2s"></div>
        <div class="absolute top-[40%] left-[30%] w-[30%] h-[30%] bg-pink-900/20 rounded-full blur-[100px] mix-blend-screen animate-aurora" style="animation-duration: 10s; animation-delay: 1s"></div>
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDIiLz4KPHBhdGggZD0iTTAgMEw4IDhaTTAgOEw4IDBaIiBzdHJva2U9IiMwMDAiIHN0cm9rZS1vcGFjaXR5PSIwLjA1Ii8+Cjwvc3ZnPg==')] opacity-50 mix-blend-overlay"></div>
    </div>

    <!-- Main Container -->
    <div class="flex flex-1 overflow-hidden z-10 relative">
        
        <!-- Sidebar (Desktop) -->

                        <i data-lucide="activity" class="text-white w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">
                            Sanvibe
                        </h1>
                        <p class="text-[10px] text-cyan-400 tracking-widest uppercase font-bold">Future Audio</p>
                    </div>
                </div>

                <!-- Nav -->
                <nav class="space-y-2 mb-10">
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4 px-3">Menu</p>
                    <button onclick="switchView('home')" id="nav-home" class="nav-btn w-full flex items-center gap-4 px-3 py-3 rounded-xl transition-all font-medium bg-white/10 text-white shadow-[0_0_20px_rgba(255,255,255,0.05)] border border-white/10">

                    <button onclick="switchView('search')" id="nav-search" class="nav-btn w-full flex items-center gap-4 px-3 py-3 rounded-xl transition-all font-medium text-gray-400 hover:text-white hover:bg-white/5">
                        <i data-lucide="search" class="w-5 h-5"></i> Discover

                    <button onclick="switchView('library')" id="nav-library" class="nav-btn w-full flex items-center gap-4 px-3 py-3 rounded-xl transition-all font-medium text-gray-400 hover:text-white hover:bg-white/5">

                <!-- Playlists -->

                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4 px-3">Your Playlists</p>

                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Profile & Branding -->
            <div class="p-6 mt-auto">

                        <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-pink-500 to-yellow-500 border-2 border-white/20"></div>

                    </div>
                    <i data-lucide="settings" class="text-gray-400 w-4 h-4 hover:text-white"></i>
                </div>
                
                <div class="mt-4 text-center">
                    <a href="https://sanstudio-hub.github.io/in/" target="_blank" rel="noopener noreferrer" class="text-xs text-gray-500 hover:text-cyan-400 transition-colors font-medium">
                        Developed By SanStudio
                    </a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col relative z-10 bg-black/20 backdrop-blur-[2px] h-full pb-24 md:pb-24">
            
            <!-- Top Navigation -->
            <header class="h-20 flex-shrink-0 flex items-center justify-between px-4 md:px-8 z-20 sticky top-0 bg-gradient-to-b from-black/80 to-transparent backdrop-blur-sm">
                <div class="flex items-center gap-4">
                    <div class="hidden md:flex gap-2">
                        <button class="p-2 rounded-full bg-black/40 border border-white/5 text-gray-400 hover:text-white"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                        <button class="p-2 rounded-full bg-black/40 border border-white/5 text-gray-400 hover:text-white"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                    </div>
                    
                    <!-- Search Bar (Visible only in Search View) -->
                    <div id="top-search-bar" class="hidden relative group w-full md:w-96">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5 group-focus-within:text-cyan-400 transition-colors"></i>
                        <input type="text" placeholder="What do you want to listen to?" class="w-full bg-white/5 border border-white/10 text-white text-sm rounded-full pl-12 pr-4 py-3 focus:outline-none focus:border-cyan-500/50 focus:bg-white/10 transition-all placeholder-gray-500">
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <button class="hidden md:flex items-center gap-2 text-sm font-semibold text-white bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full border border-white/10 transition-all">
                        <i data-lucide="sparkles" class="w-4 h-4 text-purple-400"></i> Explore Premium
                    </button>
                </div>
            </header>

            <!-- Dynamic Views Container -->
            <div id="view-container" class="flex-1 overflow-y-auto scrollbar-hide px-4 md:px-8 pt-4 pb-12">
                <!-- Content injected by JS -->
            </div>
        </main>
    </div>

    <!-- Player Bar -->
    <div class="fixed bottom-0 left-0 right-0 h-24 bg-black/80 backdrop-blur-3xl border-t border-white/10 z-50 flex items-center justify-between px-4 md:px-8 hidden" id="player-bar">
        
        <!-- Now Playing Info -->
        <div class="flex items-center gap-4 w-1/3 min-w-[150px] md:min-w-[200px]">
            <div class="relative group cursor-pointer w-12 h-12 md:w-14 md:h-14 rounded-lg overflow-hidden flex-shrink-0">
                <img id="player-cover" src="" alt="cover" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    <i data-lucide="maximize-2" class="w-4 h-4 text-white"></i>
                </div>
            </div>
            <div class="flex flex-col truncate">
                <span id="player-title" class="text-white font-semibold text-sm truncate hover:underline cursor-pointer"></span>
                <span id="player-artist" class="text-gray-400 text-xs truncate hover:underline cursor-pointer"></span>
            </div>
            <button class="hidden lg:block text-gray-400 hover:text-white ml-2"><i data-lucide="heart" class="w-4 h-4"></i></button>
        </div>

        <!-- Controls & Progress -->
        <div class="flex flex-col items-center flex-1 max-w-2xl px-2 md:px-4">
            <div class="flex items-center gap-4 md:gap-6 mb-2">
                <button onclick="toggleShuffle()" id="btn-shuffle" class="hidden sm:block text-gray-400 hover:text-white transition-colors"><i data-lucide="shuffle" class="w-4 h-4"></i></button>
                <button onclick="playPrev()" class="text-gray-400 hover:text-white transition-colors"><i data-lucide="skip-back" class="w-5 h-5"></i></button>
                
                <button onclick="togglePlay()" class="w-10 h-10 flex items-center justify-center bg-white text-black rounded-full hover:scale-105 hover:shadow-[0_0_20px_rgba(255,255,255,0.4)] transition-all">
                    <i id="play-icon" data-lucide="play" class="w-5 h-5 ml-1 fill-black"></i>
                    <i id="pause-icon" data-lucide="pause" class="w-5 h-5 hidden fill-black"></i>
                </button>
                
                <button onclick="playNext()" class="text-gray-400 hover:text-white transition-colors"><i data-lucide="skip-forward" class="w-5 h-5"></i></button>
                <button onclick="toggleRepeat()" id="btn-repeat" class="hidden sm:block text-gray-400 hover:text-white transition-colors"><i data-lucide="repeat" class="w-4 h-4"></i></button>
            </div>
            
            <div class="flex items-center gap-3 w-full text-xs text-gray-400 font-medium font-mono">
                <span id="time-current" class="w-10 text-right">0:00</span>
                <div class="range-slider-container flex-1">
                    <div id="progress-fill" class="range-fill w-0"></div>
                    <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
                </div>
                <span id="time-total" class="w-10">0:00</span>
            </div>
        </div>

        <!-- Volume & Extras -->
        <div class="hidden md:flex items-center justify-end gap-3 w-1/3 min-w-[150px]">
            <div id="waveform" class="flex items-end space-x-[2px] h-4 w-6 mr-4 opacity-0 transition-opacity">
                <div class="waveform-bar" style="animation-duration: 0.4s"></div>
                <div class="waveform-bar" style="animation-duration: 0.7s"></div>
                <div class="waveform-bar" style="animation-duration: 0.5s"></div>
                <div class="waveform-bar" style="animation-duration: 0.8s"></div>
            </div>
            <button class="text-gray-400 hover:text-white"><i data-lucide="mic-2" class="w-4 h-4"></i></button>
            <button class="text-gray-400 hover:text-white"><i data-lucide="list-music" class="w-4 h-4"></i></button>
            <div class="flex items-center gap-2 w-28 group volume-container ml-2">
                <button onclick="toggleMute()" id="btn-volume" class="text-gray-400 hover:text-white"><i data-lucide="volume-2" class="w-4 h-4"></i></button>
                <div class="range-slider-container flex-1">

                    <input type="range" id="volume-bar" min="0" max="100" value="80">

    <!-- Mobile Navigation Bar -->
    <div class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-black/90 backdrop-blur-xl border-t border-white/10 z-[60] flex items-center justify-around pb-[env(safe-area-inset-bottom)]">
        <button onclick="switchView('home')" id="mob-nav-home" class="p-2 flex flex-col items-center gap-1 text-cyan-400">
            <i data-lucide="home" class="w-5 h-5"></i>
            <span class="text-[10px]">Home</span>
        </button>
        <button onclick="switchView('search')" id="mob-nav-search" class="p-2 flex flex-col items-center gap-1 text-gray-400 hover:text-white">
            <i data-lucide="search" class="w-5 h-5"></i>
            <span class="text-[10px]">Search</span>
        </button>
        <button onclick="switchView('library')" id="mob-nav-library" class="p-2 flex flex-col items-center gap-1 text-gray-400 hover:text-white">
            <i data-lucide="library" class="w-5 h-5"></i>
            <span class="text-[10px]">Library</span>
        </button>
    </div>

    <!-- Hidden File Inputs for Local Music -->
    <input type="file" id="file-upload" accept="audio/*" multiple class="hidden">
    <input type="file" id="folder-upload" accept="audio/*" webkitdirectory directory multiple class="hidden">

    <script>
        // --- MOCK DATABASE & AUDIO SETUP ---
        const MOCK_AUDIO_URL = "https://actions.google.com/sounds/v1/water/waves_crashing_on_rock_beach.ogg";

        const DATABASE = {
            songs: [
                { id: 's1', title: 'Neon Genesis', artist: 'SynthwaveAI', album: 'Future Past', cover: 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=300&h=300', duration: 184, audioUrl: MOCK_AUDIO_URL, genre: 'Synthwave' },
                { id: 's2', title: 'Neural Lullaby', artist: 'DeepMind DJ', album: 'Sleep Cycles', cover: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=300&h=300', duration: 210, audioUrl: MOCK_AUDIO_URL, genre: 'Ambient' },
                { id: 's3', title: 'Quantum Groove', artist: 'The Algorithms', album: 'Data Structures', cover: 'https://images.unsplash.com/photo-1493225457124-a1a2a5f5f9af?auto=format&fit=crop&q=80&w=300&h=300', duration: 195, audioUrl: MOCK_AUDIO_URL, genre: 'Electronic' },
                { id: 's4', title: 'Holographic Heart', artist: 'Cybernetic Soul', album: 'Emotions.exe', cover: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=300&h=300', duration: 245, audioUrl: MOCK_AUDIO_URL, genre: 'Pop' },
                { id: 's5', title: 'Velocity', artist: 'Speed Demon', album: 'Overdrive', cover: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&q=80&w=300&h=300', duration: 170, audioUrl: MOCK_AUDIO_URL, genre: 'Rock' },
                { id: 's6', title: 'Midnight Drive', artist: 'SynthwaveAI', album: 'Future Past', cover: 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=300&h=300', duration: 220, audioUrl: MOCK_AUDIO_URL, genre: 'Synthwave' },
            ],
            playlists: [
                { id: 'p1', title: 'AI Curated: Deep Focus', type: 'ai', cover: 'https://images.unsplash.com/photo-1557672172-298e090bd0f1?auto=format&fit=crop&q=80&w=300&h=300' },
                { id: 'p2', title: 'Cyberpunk 2077 Vibes', type: 'editorial', cover: 'https://images.unsplash.com/photo-1535868463750-c78d9543614f?auto=format&fit=crop&q=80&w=300&h=300' },
                { id: 'p3', title: 'Top 50 Global', type: 'chart', cover: 'https://images.unsplash.com/photo-1619983081563-430f63602796?auto=format&fit=crop&q=80&w=300&h=300' },
                { id: 'p4', title: 'Your Daily Mix 1', type: 'ai', cover: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=300&h=300' },
            ],
            genres: [
                { name: 'Pop', color: 'from-pink-500 to-rose-500' }, { name: 'Electronic', color: 'from-cyan-500 to-blue-500' },
                { name: 'Hip-Hop', color: 'from-orange-500 to-red-500' }, { name: 'Rock', color: 'from-red-600 to-black' },
                { name: 'Indie', color: 'from-green-500 to-emerald-700' }, { name: 'Jazz', color: 'from-yellow-600 to-amber-800' },
                { name: 'Classical', color: 'from-slate-600 to-gray-800' }, { name: 'K-Pop', color: 'from-fuchsia-500 to-pink-600' }
            ],
            localSongs: [] // Store local imported files here
        };

        // --- GLOBAL STATE ---
        let state = {
            currentView: 'home',
            queue: [...DATABASE.songs],
            currentIndex: -1,
            isPlaying: false,
            volume: 0.8,
            isMuted: false,
            shuffle: false,
            repeat: false,
            duration: 0
        };

        const audio = new Audio();

        // --- DOM ELEMENTS ---
        const els = {
            viewContainer: document.getElementById('view-container'),
            topSearchBar: document.getElementById('top-search-bar'),
            playerBar: document.getElementById('player-bar'),
            
            // Player controls
            playIcon: document.getElementById('play-icon'),
            pauseIcon: document.getElementById('pause-icon'),
            cover: document.getElementById('player-cover'),
            title: document.getElementById('player-title'),
            artist: document.getElementById('player-artist'),
            timeCurrent: document.getElementById('time-current'),
            timeTotal: document.getElementById('time-total'),
            progressBar: document.getElementById('progress-bar'),
            progressFill: document.getElementById('progress-fill'),
            volumeBar: document.getElementById('volume-bar'),
            volumeFill: document.getElementById('volume-fill'),
            btnShuffle: document.getElementById('btn-shuffle'),
            btnRepeat: document.getElementById('btn-repeat'),
            btnVolume: document.getElementById('btn-volume'),
            waveform: document.getElementById('waveform'),
            
            // File upload elements
            fileUpload: document.getElementById('file-upload'),
            folderUpload: document.getElementById('folder-upload')
        };

        // --- LOCAL FILE HANDLING ---
        const processLocalFiles = (files) => {
            const audioFiles = Array.from(files).filter(file => file.type.startsWith('audio/'));
            if (audioFiles.length === 0) return;

            const newSongs = audioFiles.map((file, i) => {
                return {
                    id: 'local-' + Date.now() + '-' + i,
                    title: file.name.replace(/\.[^/.]+$/, ""), // Remove file extension for title
                    artist: 'Local Device',
                    album: 'Local Library',
                    cover: 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=300&h=300', // Default cover for local files
                    duration: 0, // Will update when played
                    audioUrl: URL.createObjectURL(file), // Creates a local memory URL for the file
                    genre: 'Local',
                    isLocal: true
                };
            });

            // Append to local database
            DATABASE.localSongs = [...DATABASE.localSongs, ...newSongs];
            
            // Re-render library view if we are on it
            if (state.currentView === 'library') {
                renderLibrary();
            }
        };

        els.fileUpload.addEventListener('change', (e) => processLocalFiles(e.target.files));
        els.folderUpload.addEventListener('change', (e) => processLocalFiles(e.target.files));

        const triggerFileUpload = () => els.fileUpload.click();
        const triggerFolderUpload = () => els.folderUpload.click();

        // --- STREAMING_CHUNK: Core utility functions... ---
        const formatTime = (seconds) => {
            if (!seconds || isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        };

        const updateIcons = () => lucide.createIcons();

        // --- RENDER FUNCTIONS ---
        const renderSidebarPlaylists = () => {
            const container = document.getElementById('sidebar-playlists');
            container.innerHTML = DATABASE.playlists.map(p => `
                <button class="w-full flex items-center gap-3 px-3 py-2 text-sm text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition-all group">
                    <i data-lucide="${p.type === 'ai' ? 'sparkles' : 'list-music'}" class="w-4 h-4 ${p.type === 'ai' ? 'text-purple-400' : ''}"></i>
                    <span class="truncate">${p.title}</span>
                </button>
            `).join('');
            updateIcons();
        };

        const renderHome = () => {
            els.viewContainer.innerHTML = `
                <div class="animate-fade-in pb-10">
                    <!-- Hero -->
                    <div class="relative w-full h-64 md:h-80 rounded-3xl overflow-hidden mb-12 shadow-2xl group">
                        <div class="absolute inset-0 bg-gradient-to-r from-purple-900/80 via-black/50 to-transparent z-10"></div>
                        <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&q=80&w=1200&h=400" class="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" alt="Hero">
                        <div class="absolute bottom-0 left-0 p-6 md:p-10 z-20 w-full">
                            <span class="inline-block px-3 py-1 bg-white/20 backdrop-blur-md rounded-full text-[10px] md:text-xs font-bold text-white mb-3 md:mb-4 uppercase tracking-widest border border-white/20">
                                AI Neuro-Mix
                            </span>
                            <h1 class="text-3xl md:text-5xl font-black text-white mb-2 tracking-tight">The Sound of Tomorrow</h1>
                            <p class="text-gray-300 max-w-lg text-xs md:text-sm mb-4 md:mb-6 hidden sm:block">Experience music generated and curated by our advanced neural networks, perfectly synced to your current biorhythms.</p>
                            <div class="flex gap-3">
                                <button onclick="playSong('${DATABASE.songs[0].id}')" class="bg-cyan-500 hover:bg-cyan-400 text-white font-bold py-2 px-6 md:py-3 md:px-8 rounded-full transition-all shadow-[0_0_20px_rgba(6,182,212,0.4)] flex items-center gap-2 text-sm md:text-base">
                                    <i data-lucide="play" class="w-4 h-4 md:w-5 md:h-5 fill-white"></i> Start Station
                                </button>
                                <button class="bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20 text-white font-bold py-2 px-6 md:py-3 md:px-8 rounded-full transition-all text-sm md:text-base hidden sm:block">
                                    Save
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Made For You -->
                    <section class="mb-10">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-xl md:text-2xl font-bold text-white tracking-tight">Made For You</h2>
                            <span class="text-xs font-semibold text-gray-400 hover:text-white cursor-pointer uppercase tracking-wider">Show all</span>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                            ${DATABASE.playlists.map(p => `
                                <div class="glass-panel p-3 md:p-4 rounded-2xl group cursor-pointer hover:bg-white/10 transition-all">
                                    <div class="relative aspect-square mb-3 md:mb-4 rounded-xl overflow-hidden shadow-lg">
                                        <img src="${p.cover}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="${p.title}">
                                        ${p.type === 'ai' ? `<div class="absolute top-2 left-2 bg-purple-500/80 backdrop-blur-md text-white text-[10px] font-bold px-2 py-1 rounded-md flex items-center gap-1"><i data-lucide="sparkles" class="w-3 h-3"></i> AI</div>` : ''}
                                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                            <button class="w-10 h-10 md:w-12 md:h-12 bg-cyan-500 text-white rounded-full flex items-center justify-center translate-y-4 group-hover:translate-y-0 transition-all shadow-[0_0_20px_rgba(6,182,212,0.5)] hover:scale-105 hover:bg-cyan-400">
                                                <i data-lucide="play" class="w-5 h-5 md:w-6 md:h-6 fill-white ml-1"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <h3 class="text-white font-bold text-sm md:text-base mb-1 truncate">${p.title}</h3>
                                    <p class="text-gray-400 text-xs truncate">${p.type === 'ai' ? 'Hyper-personalized.' : 'Curated by Editors.'}</p>
                                </div>
                            `).join('')}
                        </div>
                    </section>

                    <!-- Trending Streams -->
                    <section>
                        <h2 class="text-xl md:text-2xl font-bold text-white tracking-tight mb-4">Trending Streams</h2>
                        <div class="glass-panel p-2 md:p-4 rounded-2xl">
                            <div class="flex text-xs font-bold text-gray-400 uppercase tracking-widest border-b border-white/10 pb-3 mb-2 px-2 md:px-3">
                                <div class="w-8 md:w-10">#</div>
                                <div class="flex-1">Title</div>
                                <div class="hidden md:block flex-1">Album</div>
                                <div class="hidden lg:block w-24">Genre</div>
                                <div class="w-12 md:w-16 text-right md:mr-8"><i data-lucide="clock" class="w-4 h-4 ml-auto"></i></div>
                            </div>
                            <div class="space-y-1" id="song-list-container">
                                <!-- Songs injected here -->
                            </div>
                        </div>
                    </section>
                </div>
            `;
            renderSongsList();
            updateIcons();
        };

        const renderSongsList = () => {
            const container = document.getElementById('song-list-container');
            if(!container) return;

            container.innerHTML = DATABASE.songs.map((song, i) => {
                const isActive = state.currentIndex !== -1 && state.queue[state.currentIndex].id === song.id;
                return `
                <div onclick="playSong('${song.id}')" class="flex items-center gap-3 md:gap-4 p-2 md:p-3 rounded-xl transition-all cursor-pointer group ${isActive ? 'bg-white/10' : 'hover:bg-white/5'}">
                    <div class="w-6 md:w-8 text-center text-gray-500 text-xs md:text-sm font-medium relative">
                        ${isActive 
                            ? `<i data-lucide="volume-2" class="w-4 h-4 text-cyan-400 mx-auto"></i>` 
                            : `<span class="group-hover:hidden">${i + 1}</span><i data-lucide="play" class="w-3 h-3 md:w-4 md:h-4 hidden group-hover:block mx-auto text-white"></i>`
                        }
                    </div>
                    <img src="${song.cover}" alt="cover" class="w-8 h-8 md:w-10 md:h-10 rounded-md shadow-sm">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold truncate ${isActive ? 'text-cyan-400' : 'text-white'}">${song.title}</p>
                        <p class="text-[10px] md:text-xs text-gray-400 truncate">${song.artist}</p>
                    </div>
                    <div class="hidden md:block flex-1 text-sm text-gray-400 truncate">${song.album}</div>
                    <div class="hidden lg:block text-sm text-gray-400 w-24">${song.genre}</div>
                    <div class="text-xs md:text-sm text-gray-400 font-mono text-right w-10 md:w-12">${formatTime(song.duration)}</div>
                </div>
                `;
            }).join('');
            updateIcons();
        };

        const renderSearch = () => {
            els.viewContainer.innerHTML = `
                <div class="animate-fade-in pb-10">
                    <h2 class="text-2xl font-bold text-white mb-6">Browse all genres</h2>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                        ${DATABASE.genres.map(g => `
                            <div class="relative h-32 md:h-48 rounded-2xl overflow-hidden cursor-pointer bg-gradient-to-br ${g.color} group shadow-lg">
                                <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-300"></div>
                                <h3 class="absolute top-4 left-4 text-xl md:text-2xl font-bold text-white drop-shadow-md z-10">${g.name}</h3>
                                <div class="absolute -bottom-4 -right-4 w-24 h-24 md:w-32 md:h-32 bg-white/20 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-700"></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            updateIcons();
        };

        const renderLibrary = () => {
            if (DATABASE.localSongs.length === 0) {
                els.viewContainer.innerHTML = `
                    <div class="animate-fade-in flex flex-col items-center justify-center h-full mt-10 md:mt-20 text-center px-4">
                        <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(255,255,255,0.05)]">
                            <i data-lucide="hard-drive" class="w-10 h-10 text-cyan-400"></i>
                        </div>
                        <h2 class="text-2xl md:text-3xl font-bold text-white mb-3">Your Local Library</h2>
                        <p class="text-gray-400 text-sm max-w-md mb-8">Import your own downloaded music folders or files directly into Sanvibe. Files stay on your device and are played locally.</p>
                        <div class="flex flex-col sm:flex-row gap-4">
                            <button onclick="triggerFolderUpload()" class="bg-cyan-500 hover:bg-cyan-400 text-white font-bold py-3 px-6 rounded-full transition-all shadow-[0_0_20px_rgba(6,182,212,0.4)] flex items-center gap-2 justify-center">
                                <i data-lucide="folder-open" class="w-5 h-5"></i> Import Folder
                            </button>
                            <button onclick="triggerFileUpload()" class="bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold py-3 px-6 rounded-full transition-all flex items-center gap-2 justify-center">
                                <i data-lucide="file-audio" class="w-5 h-5"></i> Select Files
                            </button>
                        </div>
                    </div>
                `;
            } else {
                els.viewContainer.innerHTML = `
                    <div class="animate-fade-in pb-10">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                            <div>
                                <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-3">
                                    <i data-lucide="hard-drive" class="text-cyan-400 w-6 h-6"></i> Local Library
                                </h2>
                                <p class="text-gray-400 text-sm mt-1">${DATABASE.localSongs.length} tracks imported</p>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="playLocalQueue()" class="bg-cyan-500 hover:bg-cyan-400 text-white font-bold py-2 px-6 rounded-full transition-all shadow-[0_0_15px_rgba(6,182,212,0.4)] flex items-center gap-2 text-sm">
                                    <i data-lucide="play" class="w-4 h-4 fill-white"></i> Play All
                                </button>
                                <button onclick="triggerFileUpload()" class="bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold py-2 px-4 rounded-full transition-all flex items-center gap-2 text-sm">
                                    <i data-lucide="plus" class="w-4 h-4"></i> Add
                                </button>
                            </div>
                        </div>

                        <div class="glass-panel p-2 md:p-4 rounded-2xl">
                            <div class="flex text-xs font-bold text-gray-400 uppercase tracking-widest border-b border-white/10 pb-3 mb-2 px-2 md:px-3">
                                <div class="w-8 md:w-10">#</div>
                                <div class="flex-1">Title</div>
                                <div class="hidden md:block flex-1">Artist</div>
                                <div class="w-12 md:w-16 text-right md:mr-4"><i data-lucide="clock" class="w-4 h-4 ml-auto"></i></div>
                            </div>
                            <div class="space-y-1">
                                ${DATABASE.localSongs.map((song, i) => {
                                    const isActive = state.currentIndex !== -1 && state.queue[state.currentIndex]?.id === song.id;
                                    return `
                                    <div onclick="playLocalSong('${song.id}')" class="flex items-center gap-3 md:gap-4 p-2 md:p-3 rounded-xl transition-all cursor-pointer group ${isActive ? 'bg-white/10' : 'hover:bg-white/5'}">
                                        <div class="w-6 md:w-8 text-center text-gray-500 text-xs md:text-sm font-medium relative">
                                            ${isActive 
                                                ? `<i data-lucide="volume-2" class="w-4 h-4 text-cyan-400 mx-auto"></i>` 
                                                : `<span class="group-hover:hidden">${i + 1}</span><i data-lucide="play" class="w-3 h-3 md:w-4 md:h-4 hidden group-hover:block mx-auto text-white"></i>`
                                            }
                                        </div>
                                        <div class="w-8 h-8 md:w-10 md:h-10 bg-gradient-to-br from-gray-800 to-black rounded-md shadow-sm flex items-center justify-center flex-shrink-0 border border-white/10">
                                            <i data-lucide="music" class="w-4 h-4 text-cyan-400/50"></i>
                                        </div>
                                        <div class="flex-1 min-w-0">
                                            <p class="text-sm font-bold truncate ${isActive ? 'text-cyan-400' : 'text-white'}">${song.title}</p>
                                        </div>
                                        <div class="hidden md:block flex-1 text-sm text-gray-400 truncate">${song.artist}</div>
                                        <div class="text-xs md:text-sm text-gray-400 font-mono text-right w-10 md:w-12">--:--</div>
                                    </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }
            updateIcons();
        };

        const switchView = (view) => {
            state.currentView = view;
            
            // Update UI Active states
            ['home', 'search', 'library'].forEach(v => {
                // Desktop
                const btn = document.getElementById(`nav-${v}`);
                if(btn) {
                    const icon = btn.querySelector('i, svg');
                    if (v === view) {
                        btn.className = "nav-btn w-full flex items-center gap-4 px-3 py-3 rounded-xl transition-all font-medium bg-white/10 text-white shadow-[0_0_20px_rgba(255,255,255,0.05)] border border-white/10";
                        if (icon) icon.classList.add('text-cyan-400');
                    } else {
                        btn.className = "nav-btn w-full flex items-center gap-4 px-3 py-3 rounded-xl transition-all font-medium text-gray-400 hover:text-white hover:bg-white/5";
                        if (icon) icon.classList.remove('text-cyan-400');
                    }
                }
                
                // Mobile
                const mobBtn = document.getElementById(`mob-nav-${v}`);
                if(mobBtn) {
                    if (v === view) {
                        mobBtn.className = "p-2 flex flex-col items-center gap-1 text-cyan-400 transition-colors";
                    } else {
                        mobBtn.className = "p-2 flex flex-col items-center gap-1 text-gray-400 hover:text-white transition-colors";
                    }
                }
            });

            // Toggle Top Search Bar
            if (view === 'search') {
                els.topSearchBar.classList.remove('hidden');
            } else {
                els.topSearchBar.classList.add('hidden');
            }

            // Render Content
            if (view === 'home') renderHome();
            if (view === 'search') renderSearch();
            if (view === 'library') renderLibrary();
        };

        // --- AUDIO ENGINE ---
        const playSong = (songId) => {
            // Check if we need to switch context back to Main Library
            if (state.queue === DATABASE.localSongs) {
                state.queue = [...DATABASE.songs];
            }
            const index = state.queue.findIndex(s => s.id === songId);
            if (index !== -1) {
                state.currentIndex = index;
                loadAndPlayCurrent();
            }
        };

        const playLocalQueue = () => {
            if (DATABASE.localSongs.length === 0) return;
            state.queue = [...DATABASE.localSongs];
            state.currentIndex = 0;
            loadAndPlayCurrent();
        };

        const playLocalSong = (songId) => {
            if (state.queue !== DATABASE.localSongs) {
                state.queue = [...DATABASE.localSongs];
            }
            const index = state.queue.findIndex(s => s.id === songId);
            if (index !== -1) {
                state.currentIndex = index;
                loadAndPlayCurrent();
            }
        };

        const loadAndPlayCurrent = () => {
            if (state.currentIndex === -1) return;
            const song = state.queue[state.currentIndex];
            
            // Show player bar
            els.playerBar.classList.remove('hidden');
            // Adjust main padding so it doesn't hide behind player
            document.querySelector('main').classList.add('pb-24');

            // Update UI Info
            els.cover.src = song.cover;
            els.title.textContent = song.title;
            els.artist.textContent = song.artist;
            
            // Re-render home list to show active state if on home
            if(state.currentView === 'home') renderSongsList();
            if(state.currentView === 'library') renderLibrary();

            // Load audio
            audio.src = song.audioUrl;
            audio.volume = state.isMuted ? 0 : state.volume;
            audio.play().then(() => {
                state.isPlaying = true;
                updatePlayPauseUI();
                els.waveform.style.opacity = '1';
            }).catch(e => console.log("Audio auto-play prevented:", e));
        };

        const togglePlay = () => {
            if (state.currentIndex === -1 && state.queue.length > 0) {
                state.currentIndex = 0;
                loadAndPlayCurrent();
                return;
            }

            if (state.isPlaying) {
                audio.pause();
                state.isPlaying = false;
                els.waveform.style.opacity = '0';
            } else {
                audio.play();
                state.isPlaying = true;
                els.waveform.style.opacity = '1';
            }
            updatePlayPauseUI();
        };

        const playNext = () => {
            if (state.queue.length === 0) return;
            if (state.shuffle) {
                let nextIdx;
                do { nextIdx = Math.floor(Math.random() * state.queue.length); } 
                while (nextIdx === state.currentIndex && state.queue.length > 1);
                state.currentIndex = nextIdx;
            } else {
                state.currentIndex = (state.currentIndex + 1) % state.queue.length;
            }
            loadAndPlayCurrent();
        };

        const playPrev = () => {
            if (state.queue.length === 0) return;
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else {
                state.currentIndex = (state.currentIndex - 1 + state.queue.length) % state.queue.length;
                loadAndPlayCurrent();
            }
        };

        // UI Updaters
        const updatePlayPauseUI = () => {
            if (state.isPlaying) {
                els.playIcon.classList.add('hidden');
                els.pauseIcon.classList.remove('hidden');
            } else {
                els.playIcon.classList.remove('hidden');
                els.pauseIcon.classList.add('hidden');
            }
        };

        const toggleShuffle = () => {
            state.shuffle = !state.shuffle;
            els.btnShuffle.classList.toggle('text-cyan-400', state.shuffle);
            els.btnShuffle.classList.toggle('text-gray-400', !state.shuffle);
        };

        const toggleRepeat = () => {
            state.repeat = !state.repeat;
            els.btnRepeat.classList.toggle('text-cyan-400', state.repeat);
            els.btnRepeat.classList.toggle('text-gray-400', !state.repeat);
        };

        const toggleMute = () => {
            state.isMuted = !state.isMuted;
            audio.volume = state.isMuted ? 0 : state.volume;
            
            const isMutedIcon = state.isMuted || state.volume === 0 ? 'volume-x' : 'volume-2';
            els.btnVolume.innerHTML = `<i data-lucide="${isMutedIcon}" class="w-4 h-4"></i>`;
            updateIcons();

            els.volumeBar.value = state.isMuted ? 0 : state.volume * 100;
            updateVolumeFill();
        };

        // Audio Event Listeners
        audio.addEventListener('loadedmetadata', () => {
            state.duration = audio.duration;
            els.timeTotal.textContent = formatTime(state.duration);
            els.progressBar.max = state.duration;
        });

        audio.addEventListener('timeupdate', () => {
            if (!state.duration) return;
            els.timeCurrent.textContent = formatTime(audio.currentTime);
            els.progressBar.value = audio.currentTime;
            
            const percentage = (audio.currentTime / state.duration) * 100;
            els.progressFill.style.width = `${percentage}%`;
        });

        audio.addEventListener('ended', () => {
            if (state.repeat) {
                audio.currentTime = 0;
                audio.play();
            } else {
                playNext();
            }
        });

        // Range Slider Listeners
        els.progressBar.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            audio.currentTime = val;
            const percentage = (val / state.duration) * 100;
            els.progressFill.style.width = `${percentage}%`;
        });

        const updateVolumeFill = () => {
            const val = els.volumeBar.value;
            els.volumeFill.style.width = `${val}%`;
        };

        els.volumeBar.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.volume = val / 100;
            if (state.isMuted) {
                state.isMuted = false;
                els.btnVolume.innerHTML = `<i data-lucide="volume-2" class="w-4 h-4"></i>`;
                updateIcons();
            }
            audio.volume = state.volume;
            updateVolumeFill();
        });

        // --- INITIALIZATION ---
        const init = () => {
            renderSidebarPlaylists();
            switchView('home'); // Sets active classes and renders view
            updateVolumeFill();
        };

        // Run
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
