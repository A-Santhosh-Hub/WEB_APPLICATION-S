<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e5e7eb;
            overflow: hidden; 
        }

        /* Custom Scrollbar */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -5px;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
        }
        /* Make thumb visible on parent hover (for both mini and fs player) */
        .range-slider-container:hover input[type=range]::-webkit-slider-thumb {
            opacity: 1;
            transform: scale(1.1);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #374151;
            border-radius: 9999px;
        }
        
        /* Dynamic Range Track Color */
        .range-slider-container {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .range-fill {
            position: absolute;
            height: 4px;
            background: linear-gradient(to right, #06b6d4, #a855f7); 
            border-radius: 9999px;
            pointer-events: none;
        }
        .volume-fill {
            position: absolute;
            height: 4px;
            background: #ffffff;
            border-radius: 9999px;
            pointer-events: none;
            transition: background 0.3s;
        }
        .volume-container:hover .volume-fill {
            background: #22d3ee;
        }

        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Animations */
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        .animate-aurora {
            animation: pulse-slow infinite alternate;
        }

        .waveform-bar {
            width: 4px;
            background-color: #22d3ee;
            border-radius: 2px 2px 0 0;
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce {
            0% { height: 4px; }
            100% { height: 100%; }
        }

        /* Lyrics Fade Mask */
        .mask-image-gradient {
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        }

        .lyric-line {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
            opacity: 0.4;
            filter: blur(1px);
        }
        .lyric-line.active {
            opacity: 1;
            filter: blur(0px);
            transform: scale(1.1);
            text-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
            color: #fff;
        }
    </style>
</head>

    <script>
        const DATABASE = {
            localSongs: []
        };

        const state = {
            queue: [],
            currentIndex: -1,
            isPlaying: false,
            volume: 0.8,
            isMuted: false,
            shuffle: false,
            repeat: false,
            duration: 0,
            isFullScreen: false,
            audioContextInitialized: false,
            showLyrics: false,
            lyrics: [],
            hasSyncedLyrics: false,
            currentLyricIndex: -1
        };

        const audio = new Audio();

        // DOM Elements
        const els = {
            viewContainer: document.getElementById('view-container'),
            playerBar: document.getElementById('player-bar'),
            fsPlayer: document.getElementById('fs-player'),
            
            // Text Elements
            title: document.getElementById('player-title'),
            artist: document.getElementById('player-artist'),
            fsTitle: document.getElementById('fs-title'),
            fsArtist: document.getElementById('fs-artist'),
            
            // Multiple elements with same class for Syncing Mini and FS player
            timeCurrent: document.querySelectorAll('.time-current'),
            timeTotal: document.querySelectorAll('.time-total'),
            progressBars: document.querySelectorAll('.progress-bar'),
            progressFills: document.querySelectorAll('.progress-fill'),
            volumeBars: document.querySelectorAll('.volume-bar'),
            volumeFills: document.querySelectorAll('.volume-fill'),
            playPauseContainers: document.querySelectorAll('.play-pause-container'),
            btnVolumes: document.querySelectorAll('.btn-volume'),
            
            waveform: document.getElementById('waveform'),
            fileUpload: document.getElementById('file-upload'),
            folderUpload: document.getElementById('folder-upload'),
            
            // Visualizer & Lyrics
            canvas: document.getElementById('visualizer'),
            fsCoverArt: document.getElementById('fs-cover-art'),
            lyricsContainer: document.getElementById('lyrics-container'),
            lyricsText: document.getElementById('lyrics-text'),
            btnToggleLyrics: document.getElementById('btn-toggle-lyrics')
        };

        // Web Audio API Variables
        let audioCtx, analyser, dataArray, source;
        const canvasCtx = els.canvas.getContext('2d');

        // Helper: Format Time
        const formatTime = (seconds) => {
            if (!seconds || isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        };

        // Helper: Update Icons globally
        const updateIcons = () => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        };

        // --- FULLSCREEN LOGIC ---
        const toggleFullScreen = () => {
            state.isFullScreen = !state.isFullScreen;
            if (state.isFullScreen) {
                els.fsPlayer.classList.remove('translate-y-full');
                // Ensure canvas size is correct after animation
                setTimeout(resizeCanvas, 500); 
            } else {
                els.fsPlayer.classList.add('translate-y-full');
            }
        };

        // --- LYRICS LOGIC ---
        const toggleLyrics = () => {
            state.showLyrics = !state.showLyrics;
            
            if (state.showLyrics) {
                // Hide Cover Art & Dim Visualizer
                els.fsCoverArt.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
                els.canvas.classList.replace('opacity-80', 'opacity-30'); 
                
                // Show Lyrics
                els.lyricsContainer.classList.remove('hidden');
                // Small delay to allow display:block to apply before animating opacity
                setTimeout(() => els.lyricsContainer.classList.replace('opacity-0', 'opacity-100'), 50);
                
                els.btnToggleLyrics.classList.add('text-cyan-400');
                els.btnToggleLyrics.classList.remove('text-gray-400');
            } else {
                // Hide Lyrics
                els.lyricsContainer.classList.replace('opacity-100', 'opacity-0');
                els.canvas.classList.replace('opacity-30', 'opacity-80'); 
                
                // Show Cover art after fade out
                setTimeout(() => {
                    els.lyricsContainer.classList.add('hidden');
                    els.fsCoverArt.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
                }, 500);
                
                els.btnToggleLyrics.classList.remove('text-cyan-400');
                els.btnToggleLyrics.classList.add('text-gray-400');
            }
        };

        const parseSyncedLyrics = (lrcString) => {
            const lines = lrcString.split('\n');
            const regex = /\[(\d{2}):(\d{2})\.(\d{2,3}|\d{2})\](.*)/;
            state.lyrics = lines.map(line => {
                const match = regex.exec(line);
                if (match) {
                    const min = parseInt(match[1]);
                    const sec = parseInt(match[2]);
                    const ms = parseInt(match[3]);
                    // Handle [00:00.00] (centiseconds) and [00:00.000] (milliseconds) formats
                    const msMultiplier = match[3].length === 2 ? 10 : 1;
                    const time = (min * 60) + sec + (ms * msMultiplier) / 1000;
                    const text = match[4].trim();
                    return { time, text };
                }
                return null;
            }).filter(item => item !== null && item.text !== ''); // Remove empty lines
        };

        const renderSyncedLyrics = () => {
            els.lyricsText.innerHTML = state.lyrics.map((line, index) => 
                `<div id="lyric-${index}" class="lyric-line py-2 md:py-3 cursor-pointer hover:text-white transition-colors" onclick="seekLyric(${line.time})">${line.text || '♪'}</div>`
            ).join('');
        };
        
        window.seekLyric = (time) => {
            audio.currentTime = time;
            if(!state.isPlaying) togglePlay();
        };

        const fetchLyrics = async (title, artist) => {
            els.lyricsText.innerHTML = '<div class="animate-pulse text-gray-400 text-lg flex items-center justify-center h-full">Searching the web for lyrics...</div>';
            
            state.lyrics = [];
            state.hasSyncedLyrics = false;
            state.currentLyricIndex = -1;
            
            if (!navigator.onLine) {
                els.lyricsText.innerHTML = '<div class="text-gray-500 text-lg flex flex-col items-center gap-2 justify-center h-full"><i data-lucide="wifi-off" class="w-8 h-8"></i> No internet connection. Lyrics unavailable offline.</div>';
                updateIcons();
                return;
            }

            try {
                // Clean up title (remove common tags like "(Official Video)" to improve search)
                let cleanTitle = title.replace(/\(.*\)|\[.*\]/g, '').trim();
                let query = encodeURIComponent(`${cleanTitle} ${artist !== 'Local Music' ? artist : ''}`.trim());
                
                const res = await fetch(`https://lrclib.net/api/search?q=${query}`);
                if (!res.ok) throw new Error('Network response was not ok');
                
                const data = await res.json();
                
                if (data && data.length > 0) {
                    const track = data[0];
                    if (track.syncedLyrics) {
                        state.hasSyncedLyrics = true;
                        parseSyncedLyrics(track.syncedLyrics);
                        renderSyncedLyrics();
                    } else if (track.plainLyrics) {
                        els.lyricsText.innerHTML = `<div class="whitespace-pre-wrap opacity-80">${track.plainLyrics}</div>`;
                    } else {
                        els.lyricsText.innerHTML = '<div class="text-gray-500 text-lg flex items-center justify-center h-full">Lyrics not found in database.</div>';
                    }
                } else {
                    els.lyricsText.innerHTML = '<div class="text-gray-500 text-lg flex items-center justify-center h-full">Could not find lyrics for this track.</div>';
                }
            } catch (e) {
                console.error("Lyrics fetch error:", e);
                els.lyricsText.innerHTML = '<div class="text-gray-500 text-lg flex items-center justify-center h-full">Failed to connect to lyrics server.</div>';
            }
        };

        // --- VISUALIZER LOGIC ---
        const initVisualizer = () => {
            if (state.audioContextInitialized) return;
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                
                // IMPORTANT: createMediaElementSource can only be called once per audio element
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                analyser.fftSize = 256; // Defines number of bars
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                state.audioContextInitialized = true;
                drawVisualizer();
            } catch (e) {
                console.error("Audio Context initialization failed:", e);
            }
        };

        const resizeCanvas = () => {
            els.canvas.width = els.canvas.clientWidth;
            els.canvas.height = els.canvas.clientHeight;
        };
        window.addEventListener('resize', resizeCanvas);

        const drawVisualizer = () => {
            requestAnimationFrame(drawVisualizer);
            
            if (!state.isPlaying && state.audioContextInitialized) {
                // Keep drawing but it will slowly fade out to 0
            }

            analyser.getByteFrequencyData(dataArray);

            canvasCtx.clearRect(0, 0, els.canvas.width, els.canvas.height);

            const bufferLength = analyser.frequencyBinCount;
            // Leave some gap between bars
            const barWidth = (els.canvas.width / bufferLength) * 2.5; 
            let barHeight;
            let x = 0;

            for(let i = 0; i < bufferLength; i++) {
                // Scale height based on canvas height (dataArray max is 255)
                barHeight = (dataArray[i] / 255) * (els.canvas.height * 0.7);

                // Create Aurora Gradient for bars
                const gradient = canvasCtx.createLinearGradient(0, els.canvas.height, 0, els.canvas.height - barHeight);
                gradient.addColorStop(0, '#06b6d4'); // Cyan
                gradient.addColorStop(1, '#a855f7'); // Purple

                canvasCtx.fillStyle = gradient;
                
                // Draw rounded rect (simplified simulation via arc/fillRect combination)
                const yPos = els.canvas.height - barHeight;
                const radius = Math.min(barWidth / 2, barHeight / 2);
                
                if (barHeight > 0) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(x, els.canvas.height);
                    canvasCtx.lineTo(x, yPos + radius);
                    canvasCtx.quadraticCurveTo(x, yPos, x + radius, yPos);
                    canvasCtx.quadraticCurveTo(x + barWidth, yPos, x + barWidth, yPos + radius);
                    canvasCtx.lineTo(x + barWidth, els.canvas.height);
                    canvasCtx.fill();
                }

                x += barWidth + 2; // Spacing
            }
        };

        // --- FILE PROCESSING ---
        const processLocalFiles = (files) => {
            const audioFiles = Array.from(files).filter(file => file.type.startsWith('audio/'));
            if (audioFiles.length === 0) return;

            const newSongs = audioFiles.map((file, i) => {
                let rawName = file.name.replace(/\.[^/.]+$/, "");
                let title = rawName;
                let artist = "Local Music";
                
                if (rawName.includes(" - ")) {
                    const parts = rawName.split(" - ");
                    artist = parts[0].trim();
                    title = parts.slice(1).join(" - ").trim();
                }

                return {
                    id: 'local-' + Date.now() + '-' + i,
                    title: title,
                    artist: artist,
                    duration: 0, 
                    audioUrl: URL.createObjectURL(file) 
                };
            });

            DATABASE.localSongs = [...DATABASE.localSongs, ...newSongs];
            renderLibrary();
        };

        els.fileUpload.addEventListener('change', (e) => processLocalFiles(e.target.files));
        els.folderUpload.addEventListener('change', (e) => processLocalFiles(e.target.files));

        const triggerFileUpload = () => els.fileUpload.click();
        const triggerFolderUpload = () => els.folderUpload.click();

        // --- RENDER UI ---
        const renderLibrary = () => {
            if (DATABASE.localSongs.length === 0) {
                els.viewContainer.innerHTML = `
                    <div class="animate-fade-in flex flex-col items-center justify-center h-full mt-10 md:mt-20 text-center px-4">
                        <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(255,255,255,0.05)]">
                            <i data-lucide="hard-drive" class="w-10 h-10 text-cyan-400"></i>
                        </div>
                        <h2 class="text-2xl md:text-3xl font-bold text-white mb-3">Your Local Library</h2>
                        <p class="text-gray-400 text-sm max-w-md mb-8">Import your downloaded music folders or files directly. Play instantly without internet.</p>
                        <div class="flex flex-col sm:flex-row gap-4">
                            <button onclick="triggerFolderUpload()" class="bg-cyan-500 hover:bg-cyan-400 text-white font-bold py-3 px-6 rounded-full transition-all shadow-[0_0_20px_rgba(6,182,212,0.4)] flex items-center gap-2 justify-center">
                                <i data-lucide="folder-open" class="w-5 h-5"></i> Import Folder
                            </button>
                            <button onclick="triggerFileUpload()" class="bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold py-3 px-6 rounded-full transition-all flex items-center gap-2 justify-center">
                                <i data-lucide="file-audio" class="w-5 h-5"></i> Select Files
                            </button>
                        </div>
                    </div>
                `;
            } else {
                const listHtml = DATABASE.localSongs.map((song, i) => {
                    const isActive = state.currentIndex !== -1 && state.queue[state.currentIndex]?.id === song.id;
                    return `
                    <div onclick="playSong('${song.id}')" class="flex items-center gap-3 md:gap-4 p-2 md:p-3 rounded-xl transition-all cursor-pointer group ${isActive ? 'bg-white/10' : 'hover:bg-white/5'}">
                        <div class="w-6 md:w-8 text-center text-gray-500 text-xs md:text-sm font-medium relative">
                            ${isActive 
                                ? `<i data-lucide="volume-2" class="w-4 h-4 text-cyan-400 mx-auto"></i>` 
                                : `<span class="group-hover:hidden">${i + 1}</span><i data-lucide="play" class="w-3 h-3 md:w-4 md:h-4 hidden group-hover:block mx-auto text-white"></i>`
                            }
                        </div>
                        <div class="w-8 h-8 md:w-10 md:h-10 bg-gradient-to-br from-gray-800 to-black rounded-md shadow-sm flex items-center justify-center flex-shrink-0 border border-white/10">
                            <i data-lucide="music" class="w-4 h-4 text-cyan-400/50"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold truncate ${isActive ? 'text-cyan-400' : 'text-white'}">${song.title}</p>
                        </div>
                        <div class="hidden md:block flex-1 text-sm text-gray-400 truncate">${song.artist}</div>
                        <div class="text-xs md:text-sm text-gray-400 font-mono text-right w-10 md:w-12">${song.duration ? formatTime(song.duration) : '--:--'}</div>
                    </div>
                    `;
                }).join('');

                els.viewContainer.innerHTML = `
                    <div class="animate-fade-in pb-10">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                            <div>
                                <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-3">
                                    <i data-lucide="hard-drive" class="text-cyan-400 w-6 h-6"></i> Local Library
                                </h2>
                                <p class="text-gray-400 text-sm mt-1">${DATABASE.localSongs.length} tracks ready</p>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="playLocalQueue()" class="bg-cyan-500 hover:bg-cyan-400 text-white font-bold py-2 px-6 rounded-full transition-all shadow-[0_0_15px_rgba(6,182,212,0.4)] flex items-center gap-2 text-sm">
                                    <i data-lucide="play" class="w-4 h-4 fill-white"></i> Play All
                                </button>
                                <button onclick="triggerFileUpload()" class="bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold py-2 px-4 rounded-full transition-all flex items-center gap-2 text-sm">
                                    <i data-lucide="plus" class="w-4 h-4"></i> Add
                                </button>
                            </div>
                        </div>

                        <div class="glass-panel p-2 md:p-4 rounded-2xl">
                            <div class="flex text-xs font-bold text-gray-400 uppercase tracking-widest border-b border-white/10 pb-3 mb-2 px-2 md:px-3">
                                <div class="w-8 md:w-10">#</div>
                                <div class="flex-1">Title</div>
                                <div class="hidden md:block flex-1">Artist</div>
                                <div class="w-12 md:w-16 text-right md:mr-4"><i data-lucide="clock" class="w-4 h-4 ml-auto"></i></div>
                            </div>
                            <div class="space-y-1">${listHtml}</div>
                        </div>
                    </div>
                `;
            }
            updateIcons();
        };

        // --- PLAYBACK ENGINE ---
        const playSong = (songId) => {
            state.queue = [...DATABASE.localSongs];
            const index = state.queue.findIndex(s => s.id === songId);
            if (index !== -1) {
                state.currentIndex = index;
                loadAndPlayCurrent();
            }
        };

        const playLocalQueue = () => {
            if (DATABASE.localSongs.length === 0) return;
            state.queue = [...DATABASE.localSongs];
            state.currentIndex = 0;
            loadAndPlayCurrent();
        };

        const loadAndPlayCurrent = () => {
            if (state.currentIndex === -1) return;
            const song = state.queue[state.currentIndex];
            
            // Show player bar
            els.playerBar.classList.remove('hidden');
            
            // Update Text (Mini and FS)
            els.title.textContent = song.title;
            els.artist.textContent = song.artist;
            els.fsTitle.textContent = song.title;
            els.fsArtist.textContent = song.artist;
            
            renderLibrary(); 

            audio.src = song.audioUrl;
            audio.volume = state.isMuted ? 0 : state.volume;
            
            // Fetch Lyrics for new song from the internet
            fetchLyrics(song.title, song.artist);
            
            // Required for Web Audio API context initialization
            initVisualizer();
            
            // Play
            audio.play().then(() => {
                state.isPlaying = true;
                updatePlayPauseUI();
                els.waveform.style.opacity = '1';
                
                // Ensure audio context is running (browsers suspend it sometimes)
                if(audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }).catch(e => console.log("Audio play prevented:", e));
        };

        const togglePlay = () => {
            if (state.currentIndex === -1 && state.queue.length > 0) {
                state.currentIndex = 0;
                loadAndPlayCurrent();
                return;
            }
            if (state.currentIndex === -1) return;

            if (state.isPlaying) {
                audio.pause();
                state.isPlaying = false;
                els.waveform.style.opacity = '0';
            } else {
                initVisualizer();
                audio.play();
                state.isPlaying = true;
                els.waveform.style.opacity = '1';
                if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            }
            updatePlayPauseUI();
        };

        const playNext = () => {
            if (state.queue.length === 0) return;
            if (state.shuffle) {
                let nextIdx;
                do { nextIdx = Math.floor(Math.random() * state.queue.length); } 
                while (nextIdx === state.currentIndex && state.queue.length > 1);
                state.currentIndex = nextIdx;
            } else {
                state.currentIndex = (state.currentIndex + 1) % state.queue.length;
            }
            loadAndPlayCurrent();
        };

        const playPrev = () => {
            if (state.queue.length === 0) return;
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else {
                state.currentIndex = (state.currentIndex - 1 + state.queue.length) % state.queue.length;
                loadAndPlayCurrent();
            }
        };

        const updatePlayPauseUI = () => {
            els.playPauseContainers.forEach(container => {
                if (state.isPlaying) {
                    container.innerHTML = `<i data-lucide="pause" class="w-${container.closest('#fs-player') ? '8 h-8' : '5 h-5'} fill-black"></i>`;
                } else {
                    container.innerHTML = `<i data-lucide="play" class="w-${container.closest('#fs-player') ? '8 h-8 ml-2' : '5 h-5 ml-1'} fill-black"></i>`;
                }
            });
            updateIcons();
        };

        const toggleShuffle = () => {
            state.shuffle = !state.shuffle;
            ['btn-shuffle', 'fs-btn-shuffle'].forEach(id => {
                const btn = document.getElementById(id);
                if(btn) {
                    btn.classList.toggle('text-cyan-400', state.shuffle);
                    btn.classList.toggle('text-gray-400', !state.shuffle);
                }
            });
        };

        const toggleRepeat = () => {
            state.repeat = !state.repeat;
            ['btn-repeat', 'fs-btn-repeat'].forEach(id => {
                const btn = document.getElementById(id);
                if(btn) {
                    btn.classList.toggle('text-cyan-400', state.repeat);
                    btn.classList.toggle('text-gray-400', !state.repeat);
                }
            });
        };

        const toggleMute = () => {
            state.isMuted = !state.isMuted;
            audio.volume = state.isMuted ? 0 : state.volume;
            
            const isMutedIcon = state.isMuted || state.volume === 0 ? 'volume-x' : 'volume-2';
            els.btnVolumes.forEach(btn => {
                const sizeClass = btn.closest('#fs-player') ? 'w-5 h-5' : 'w-4 h-4';
                btn.innerHTML = `<i data-lucide="${isMutedIcon}" class="${sizeClass}"></i>`;
            });
            updateIcons();

            const val = state.isMuted ? 0 : state.volume * 100;
            els.volumeBars.forEach(bar => bar.value = val);
            updateVolumeFill();
        };

        // --- AUDIO EVENTS ---
        audio.addEventListener('loadedmetadata', () => {
            state.duration = audio.duration;
            const timeStr = formatTime(state.duration);
            
            els.timeTotal.forEach(el => el.textContent = timeStr);
            els.progressBars.forEach(bar => bar.max = state.duration);

            if (state.queue[state.currentIndex] && !state.queue[state.currentIndex].duration) {
                state.queue[state.currentIndex].duration = audio.duration;
                const dbSong = DATABASE.localSongs.find(s => s.id === state.queue[state.currentIndex].id);
                if (dbSong) dbSong.duration = audio.duration;
                renderLibrary();
            }
        });

        audio.addEventListener('timeupdate', () => {
            if (!state.duration) return;
            const timeStr = formatTime(audio.currentTime);
            const percentage = (audio.currentTime / state.duration) * 100;

            els.timeCurrent.forEach(el => el.textContent = timeStr);
            els.progressBars.forEach(bar => bar.value = audio.currentTime);
            els.progressFills.forEach(fill => fill.style.width = `${percentage}%`);

            if (state.hasSyncedLyrics && state.showLyrics) {
                const currentTime = audio.currentTime;
                let newIndex = -1;
                
                // Add 0.3s offset so lyrics pop slightly before they are actually sung
                for (let i = 0; i < state.lyrics.length; i++) {
                    if (currentTime >= state.lyrics[i].time - 0.3) {
                        newIndex = i;
                    } else {
                        break;
                    }
                }

                if (newIndex !== state.currentLyricIndex && newIndex !== -1) {
                    if (state.currentLyricIndex !== -1) {
                        const oldEl = document.getElementById(`lyric-${state.currentLyricIndex}`);
                        if (oldEl) oldEl.classList.remove('active', 'text-cyan-400');
                    }
                    
                    const newEl = document.getElementById(`lyric-${newIndex}`);
                    if (newEl) {
                        newEl.classList.add('active', 'text-cyan-400');
                        
                        // Auto-scroll logic
                        const container = els.lyricsContainer;
                        // Determine the position of the new active lyric line relative to its scroll container
                        const offset = newEl.offsetTop - (container.clientHeight / 2) + (newEl.clientHeight / 2);
                        
                        container.scrollTo({ top: Math.max(0, offset), behavior: 'smooth' });
                    }
                    state.currentLyricIndex = newIndex;
                }
            }
        });

        audio.addEventListener('ended', () => {
            if (state.repeat) {
                audio.currentTime = 0;
                audio.play();
            } else {
                playNext();
            }
        });

        // --- INPUT SYNCING ---
        els.progressBars.forEach(bar => {
            bar.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                audio.currentTime = val;
                const percentage = (val / state.duration) * 100;
                
                els.progressBars.forEach(b => b.value = val);
                els.progressFills.forEach(fill => fill.style.width = `${percentage}%`);
            });
        });

        const updateVolumeFill = () => {
            const val = els.volumeBars[0].value; // get from any, they sync
            els.volumeFills.forEach(fill => fill.style.width = `${val}%`);
        };

        els.volumeBars.forEach(bar => {
            bar.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                state.volume = val / 100;
                
                // Unmute if changing volume while muted
                if (state.isMuted) {
                    state.isMuted = false;
                    els.btnVolumes.forEach(btn => {
                        const sizeClass = btn.closest('#fs-player') ? 'w-5 h-5' : 'w-4 h-4';
                        btn.innerHTML = `<i data-lucide="volume-2" class="${sizeClass}"></i>`;
                    });
                    updateIcons();
                }
                
                audio.volume = state.volume;
                
                // Sync all volume bars
                els.volumeBars.forEach(b => b.value = val);
                updateVolumeFill();
            });
        });

        // Initialize UI
        document.addEventListener('DOMContentLoaded', () => {
            renderLibrary();
            updateVolumeFill();
            updateIcons();
            resizeCanvas();
        });

    </script>
</body>
</html>
