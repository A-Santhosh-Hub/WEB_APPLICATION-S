    <!-- Custom Styles & Animations -->
    <style>
        body {
            background-color: #ffffff;
            color: #111111;
        }
        .dark body {
            background-color: #0b0b0b;
            color: #ffffff;
        }
        
        /* Clean minimal scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #374151;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* News Sliding Animation */
        @keyframes revealNews {
            0%, 15% { left: 0%; transform: translateX(0%); }
            85%, 100% { left: 100%; transform: translateX(-100%); }
        }
        .animate-reveal-news {
            position: relative;
            display: inline-block;
            white-space: nowrap;
            animation: revealNews 12s ease-in-out forwards;
        }
    </style>

    <!-- Import maps for React and Lucide Icons -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.294.0"
            }
        }
    </script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="transition-colors duration-300 selection:bg-brave-orange selection:text-white antialiased">
    
    <!-- App Entry Point -->
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          LayoutDashboard, Fingerprint, GraduationCap, Receipt, Plane, 
          PhoneCall, ShoppingCart, BookOpen, CreditCard, FolderLock, 
          Settings, Bell, Search, Sun, Moon, Eye, EyeOff, Menu, X,
          Plus, Check, Download, Upload, Shield, Trash2, Calendar, MapPin, Pencil, Newspaper, ExternalLink, Activity, Globe, Link as LinkIcon, Briefcase, TrendingUp, ArrowRightLeft, DownloadCloud
        } from 'lucide-react';

        // --- CUSTOM HOOKS ---
        function useLocalStorage(key, initialValue) {
          const [storedValue, setStoredValue] = useState(() => {
            try {
              const item = window.localStorage.getItem(key);
              return item ? JSON.parse(item) : initialValue;
            } catch (error) {
              console.error(error);
              return initialValue;
            }
          });

          const setValue = (value) => {
            try {
              const valueToStore = value instanceof Function ? value(storedValue) : value;
              setStoredValue(valueToStore);
              window.localStorage.setItem(key, JSON.stringify(valueToStore));
            } catch (error) {
              console.error(error);
            }
          };
          return [storedValue, setValue];
        }

        // --- MOCK / INITIAL DATA ---
        const INITIAL_DATA = {
          tasks: [
            { id: 1, title: 'Review LifeOS Code Architecture', completed: false, priority: 'high' },
            { id: 2, title: 'Call Client for Freelance Project', completed: true, priority: 'medium' },
            { id: 3, title: 'Buy Groceries', completed: false, priority: 'low' },
          ],
          bills: [
            { id: 1, name: 'Electricity Bill', amount: 1250, dueDate: '2026-06-01', cycle: '1 Month', paid: false },
            { id: 2, name: 'Mobile Recharge (Jio)', amount: 749, dueDate: '2026-05-15', cycle: '28 Days', paid: false },
            { id: 3, name: 'Internet (Airtel)', amount: 999, dueDate: '2026-06-15', cycle: '1 Month', paid: false },
          ],
          identity: [
            { id: 1, type: 'Aadhaar', number: '123456789012', name: 'Santhosh A' },
            { id: 2, type: 'PAN Card', number: 'ABCDE1234F', name: 'Santhosh A' },
          ],
          learning: [
            { id: 1, course: 'Advanced React Patterns', platform: 'Frontend Masters', progress: 75 },
            { id: 2, course: 'System Design Interview', platform: 'AlgoExpert', progress: 30 },
          ],
          subscriptions: [
            { id: 1, name: 'Netflix', cost: 199, cycle: 'Monthly' },
            { id: 2, name: 'GitHub Copilot', cost: 850, cycle: 'Monthly' },
          ],
          education: [{ id: 1, degree: 'B.Tech Computer Science', institution: 'Anna University', year: '2024', mark: '8.5 CGPA', project: 'LifeOS Digital Dashboard', note: 'First Class with Distinction' }],
          travel: [{ id: 1, destination: 'New York', date: '2026-06-15', type: 'Flight' }],
          calls: [{ id: 1, name: 'Santhosh (Client)', number: '+91 9876543210', completed: false }],
          shopping: [{ id: 1, item: 'Wireless Mouse', cost: 1500, budget: 2000, completed: false }],
          documents: [{ id: 1, name: 'Passport', expiry: '2030-01-01' }],
          links: [
            { id: 1, title: 'GitHub Daily Commit', url: 'https://github.com', priority: 'high', completed: false },
            { id: 2, title: 'University Portal', url: 'https://example.com', priority: 'normal', completed: true }
          ],
          quickLinks: [
            { id: 1, name: 'YouTube', url: 'https://youtube.com' },
            { id: 2, name: 'Google', url: 'https://google.com' },
            { id: 3, name: 'GitHub', url: 'https://github.com' },
            { id: 4, name: 'ChatGPT', url: 'https://chatgpt.com' }
          ],
          financeSummary: { balance: 45000, income: 60000, expense: 15000 }
        };

        // --- BRAVE STYLE COMPONENTS ---
        const BraveCard = ({ children, className = "", colSpan = 1, rowSpan = 1, onClick, bgColor = "bg-white dark:bg-brave-card-dark" }) => {
          const spanClasses = `col-span-1 md:col-span-${colSpan} row-span-${rowSpan}`;
          return (
            <div onClick={onClick} className={`rounded-[20px] border border-gray-200 dark:border-gray-800 shadow-sm transition-all duration-200 hover:shadow-md p-6 lg:p-8 flex flex-col ${bgColor} ${spanClasses} ${className} ${onClick ? 'cursor-pointer hover:-translate-y-1' : ''}`}>
              {children}
            </div>
          );
        };

        const BraveButton = ({ children, onClick, variant = 'primary', className = '', disabled=false }) => {
          const baseClasses = `px-6 py-2.5 rounded-full font-sans font-semibold transition-all duration-200 flex items-center justify-center gap-2 text-sm shadow-sm ${disabled ? 'opacity-50 cursor-not-allowed' : ''}`;
          const variants = {
            primary: "bg-brave-orange text-white hover:bg-brave-orange-hover border border-transparent",
            secondary: "bg-gray-100 text-gray-900 hover:bg-gray-200 border border-transparent dark:bg-[#2a2a2a] dark:text-white dark:hover:bg-[#333]",
            outline: "bg-transparent text-gray-900 dark:text-white border border-gray-300 dark:border-gray-700 hover:border-gray-400 dark:hover:border-gray-500",
            danger: "bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 dark:bg-red-900/20 dark:border-red-800 dark:hover:bg-red-900/40"
          };
          return (
            <button onClick={onClick} disabled={disabled} className={`${baseClasses} ${variants[variant]} ${className}`}>
              {children}
            </button>
          );
        };

        const BraveInput = ({ ...props }) => (
          <input 
            {...props} 
            className={`flex-1 bg-white dark:bg-[#1a1a1a] border border-gray-300 dark:border-gray-700 rounded-full px-5 py-3 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 outline-none focus:border-brave-orange focus:ring-1 focus:ring-brave-orange transition-all shadow-sm ${props.className || ''}`}
          />
        );

        const Badge = ({ children, className="" }) => (
          <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${className}`}>
            {children}
          </span>
        );

        // --- MAIN APPLICATION ---
        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [isSidebarOpen, setIsSidebarOpen] = useState(false);
          const [isDarkMode, setIsDarkMode] = useLocalStorage('lifeos_theme', false); // Default to light mode for Brave feel
          const [isPrivacyMode, setIsPrivacyMode] = useState(false);
          const [isEditMode, setIsEditMode] = useLocalStorage('lifeos_edit_mode', false);
          const [userName, setUserName] = useLocalStorage('lifeos_username', 'Santhosh');
          const [appData, setAppData] = useLocalStorage('lifeos_user_data', INITIAL_DATA);
          const [isNotificationsOpen, setIsNotificationsOpen] = useState(false);
          const [activeIframeUrl, setActiveIframeUrl] = useState(null);

          useEffect(() => {
            if (isDarkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }, [isDarkMode]);

          const maskText = (text, type = 'default') => {
            if (!isPrivacyMode) return text;
            if (type === 'number') return 'XXXX XXXX ' + String(text).slice(-4);
            if (type === 'amount') return '₹ **.**';
            return '••••••••';
          };

          const checkDueStatus = (dateString) => {
            const due = new Date(dateString);
            const now = new Date();
            const diffDays = Math.ceil((due - now) / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) return { status: 'overdue', text: 'Overdue', color: 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400' };
            if (diffDays <= 2) return { status: 'urgent', text: `${diffDays} days left`, color: 'bg-orange-100 text-orange-800 dark:bg-orange-900/30 dark:text-orange-400' };
            return { status: 'normal', text: `In ${diffDays} days`, color: 'bg-gray-100 text-gray-800 dark:bg-gray-800 dark:text-gray-300' };
          };

          const getNotifications = () => {
            const notifs = [];
            (appData.bills || []).forEach(bill => {
              if (!bill.paid) {
                const status = checkDueStatus(bill.dueDate);
                if (status.status !== 'normal') {
                  notifs.push({ 
                    id: `bill-${bill.id}`, 
                    title: `Bill ${status.status}`, 
                    message: `${bill.name} - ${maskText(bill.amount, 'amount')}`, 
                    time: status.text, 
                    color: status.status === 'overdue' ? 'text-red-500' : 'text-brave-orange', 
                    icon: Receipt 
                  });
                }
              }
            });
            (appData.tasks || []).forEach(task => {
              if (!task.completed && task.priority === 'high') {
                notifs.push({ 
                  id: `task-${task.id}`, 
                  title: 'High Priority Task', 
                  message: task.title, 
                  time: 'Pending', 
                  color: 'text-blue-500', 
                  icon: LayoutDashboard 
                });
              }
            });
            return notifs;
          };

          const notifications = getNotifications();

          const navItems = [
            { id: 'dashboard', icon: LayoutDashboard, label: 'Dashboard' },
            { id: 'currency', icon: TrendingUp, label: 'Money Rates' },
            { id: 'news', icon: Newspaper, label: 'Live News' },
            { id: 'links', icon: Globe, label: 'Links & Tasks' },
            { id: 'jobs', icon: Briefcase, label: 'IT Jobs' },
            { id: 'identity', icon: Fingerprint, label: 'Identity Vault' },
            { id: 'education', icon: GraduationCap, label: 'Education' },
            { id: 'finance', icon: Receipt, label: 'Finance' },
            { id: 'travel', icon: Plane, label: 'Travel' },
            { id: 'calls', icon: PhoneCall, label: 'Contacts' },
            { id: 'shopping', icon: ShoppingCart, label: 'Inventory' },
            { id: 'learning', icon: BookOpen, label: 'Skills' },
            { id: 'subscriptions', icon: CreditCard, label: 'Subscriptions' },
            { id: 'documents', icon: FolderLock, label: 'Documents' },
          ];

          // ===============================
          // --- MODULE COMPONENTS ---
          // ===============================

          const DashboardView = () => {
            const pendingTasks = (appData.tasks || []).filter(t => !t.completed).length;
            const urgentBills = (appData.bills || []).filter(b => !b.paid && checkDueStatus(b.dueDate).status !== 'normal').length;
            const learningItems = appData.learning || [];
            const avgLearning = learningItems.reduce((acc, curr) => acc + (curr.progress || 0), 0) / (learningItems.length || 1);

            const [newTask, setNewTask] = useState('');
            const [editTaskId, setEditTaskId] = useState(null);
            const [isAddingQuickLink, setIsAddingQuickLink] = useState(false);
            const [quickLinkData, setQuickLinkData] = useState({ name: '', url: '' });
            const [isEditingFinance, setIsEditingFinance] = useState(false);
            const [financeForm, setFinanceForm] = useState(appData.financeSummary || { balance: 0, income: 0, expense: 0 });
            const [weatherTemp, setWeatherTemp] = useState('28');

            const getGreeting = () => {
              const hour = new Date().getHours();
              if (hour < 12) return 'GOOD MORNING';
              if (hour < 18) return 'GOOD AFTERNOON';
              return 'GOOD EVENING';
            };

            const [newsList, setNewsList] = useState([]);
            const [newsIndex, setNewsIndex] = useState(0);

            useEffect(() => {
              const fetchNews = async () => {
                try {
                  const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=தமிழ்நாடு&hl=ta&gl=IN&ceid=IN:ta');
                  const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                  const data = await res.json();
                  if(data.status === 'ok' && data.items.length > 0) {
                     setNewsList(data.items.map(item => item.title.split(' - ')[0]));
                  }
                } catch(e) {
                  console.error("Failed to fetch Live News", e);
                }
              };
              fetchNews();
            }, []);

            useEffect(() => {
              if (newsList.length === 0) return;
              const timer = setTimeout(() => {
                setNewsIndex((prev) => (prev + 1) % newsList.length);
              }, 6000);
              return () => clearTimeout(timer);
            }, [newsList, newsIndex]);

            useEffect(() => {
              const fetchWeather = async () => {
                try {
                  const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=11.1271&longitude=78.6569&current_weather=true');
                  const data = await res.json();
                  if (data.current_weather) {
                    setWeatherTemp(Math.round(data.current_weather.temperature));
                  }
                } catch(e) {
                  console.error('Weather fetch failed', e);
                }
              };
              fetchWeather();
            }, []);

            const handleAddQuickLink = () => {
              if(!quickLinkData.name || !quickLinkData.url) return;
              let finalUrl = quickLinkData.url.startsWith('http') ? quickLinkData.url : `https://${quickLinkData.url}`;
              const newObj = { id: Date.now(), name: quickLinkData.name, url: finalUrl };
              setAppData({...appData, quickLinks: [...(appData.quickLinks || []), newObj]});
              setIsAddingQuickLink(false);
              setQuickLinkData({name:'', url:''});
            };

            const removeQuickLink = (id) => {
              setAppData({...appData, quickLinks: (appData.quickLinks || []).filter(l => l.id !== id)});
            };

            const addTask = () => {
              if(!newTask) return;
              if (editTaskId) {
                const newTasks = (appData.tasks || []).map(t => t.id === editTaskId ? {...t, title: newTask} : t);
                setAppData({...appData, tasks: newTasks});
                setEditTaskId(null);
              } else {
                const newObj = { id: Date.now(), title: newTask, completed: false, priority: 'normal' };
                setAppData({...appData, tasks: [newObj, ...(appData.tasks || [])]});
              }
              setNewTask('');
            };

            const triggerEdit = (task) => {
               setNewTask(task.title);
               setEditTaskId(task.id);
            };

            return (
              <div className="grid grid-cols-1 md:grid-cols-4 gap-6 animate-fade-in">
                
                {/* Hero Greeting Card */}
                <div className="col-span-1 md:col-span-4 mb-2 flex flex-col md:flex-row md:items-end justify-between gap-6">
                    <div>
                        <p className="text-sm font-bold text-gray-500 dark:text-gray-400 tracking-widest uppercase mb-2">
                            {new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
                        </p>
                        <h1 className="text-4xl md:text-5xl font-serif font-bold text-gray-900 dark:text-white leading-tight tracking-tight uppercase">
                            {getGreeting()}, <span className="italic text-brave-orange">{userName}</span>
                        </h1>
                    </div>
                    <div className="flex items-center gap-4 shrink-0 pb-2">
                        <BraveButton onClick={() => setActiveTab('finance')} className="hidden md:flex">View Finance <ArrowRightLeft className="w-4 h-4 ml-1"/></BraveButton>
                        <div className="flex items-center gap-2 px-4 py-2 bg-gray-100 dark:bg-[#1a1a1a] rounded-full text-sm font-medium border border-gray-200 dark:border-gray-800 text-gray-800 dark:text-gray-200 shadow-sm">
                            <Sun className="w-4 h-4 text-brave-orange" />
                            {weatherTemp}°C Erode
                        </div>
                    </div>
                </div>

                {/* Live News Ticker */}
                {newsList.length > 0 && (
                    <div className="col-span-1 md:col-span-4 mb-2 bg-gray-50 dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 rounded-full px-4 md:px-6 py-3 flex items-center gap-3 md:gap-4 shadow-sm overflow-hidden relative cursor-pointer hover:bg-gray-100 dark:hover:bg-[#222] transition-colors" onClick={() => setActiveTab('news')}>
                        <Badge className="bg-orange-100 text-orange-800 dark:bg-orange-900/30 dark:text-orange-400 border border-orange-200 dark:border-orange-800/50 shrink-0 flex items-center gap-1">
                          <Activity className="w-3 h-3 animate-pulse" /> <span className="hidden md:inline">Live TN News</span><span className="md:hidden">Live</span>
                        </Badge>
                        <div className="flex-1 overflow-hidden relative h-5 md:h-6">
                            <div key={newsIndex} className="absolute inset-0 animate-fade-in flex items-center">
                                <p className="text-xs md:text-sm font-medium text-gray-800 dark:text-gray-200 truncate w-full">
                                    {newsList[newsIndex]}
                                </p>
                            </div>
                        </div>
                    </div>
                )}

                <BraveCard colSpan={2} bgColor="bg-brave-peach dark:bg-[#3d2a1d]">
                  <div className="flex justify-between items-center mb-6">
                     <h3 className="text-2xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
                       Financial Overview
                    </h3>
                    {isEditMode && (
                      <button 
                        onClick={() => {
                          setFinanceForm(appData.financeSummary || { balance: 0, income: 0, expense: 0 });
                          setIsEditingFinance(!isEditingFinance);
                        }} 
                        className="text-gray-500 hover:text-gray-900 dark:hover:text-white transition-colors"
                      >
                        {isEditingFinance ? <X className="w-5 h-5" /> : <Pencil className="w-4 h-4" />}
                      </button>
                    )}
                  </div>

                  {isEditMode && isEditingFinance ? (
                     <div className="grid grid-cols-1 gap-4 mb-2 bg-white/50 dark:bg-black/20 p-4 rounded-xl border border-gray-200 dark:border-gray-700/50">
                       <BraveInput type="number" placeholder="Main Balance" value={financeForm.balance} onChange={e=>setFinanceForm({...financeForm, balance: Number(e.target.value)})} />
                       <div className="flex gap-4">
                           <BraveInput type="number" placeholder="Income" value={financeForm.income} onChange={e=>setFinanceForm({...financeForm, income: Number(e.target.value)})} />
                           <BraveInput type="number" placeholder="Expense" value={financeForm.expense} onChange={e=>setFinanceForm({...financeForm, expense: Number(e.target.value)})} />
                       </div>
                       <BraveButton onClick={() => { setAppData({...appData, financeSummary: financeForm}); setIsEditingFinance(false); }}>
                         Save Overview
                       </BraveButton>
                     </div>
                  ) : (
                    <div className="flex flex-col justify-between h-full">
                       <div>
                         <p className="text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Main Balance</p>
                         <p className="text-4xl md:text-5xl font-bold text-gray-900 dark:text-white mb-6">
                           {isPrivacyMode ? maskText(appData.financeSummary?.balance || 0, 'amount') : `₹${(appData.financeSummary?.balance || 0).toLocaleString('en-IN')}`}
                         </p>
                       </div>
                       <div className="grid grid-cols-2 gap-4 border-t border-gray-200 dark:border-gray-700/50 pt-6">
                         <div>
                           <p className="text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Monthly Income</p>
                           <p className="text-xl font-bold text-green-600 dark:text-green-400">
                             + {isPrivacyMode ? maskText(appData.financeSummary?.income || 0, 'amount') : `₹${(appData.financeSummary?.income || 0).toLocaleString('en-IN')}`}
                           </p>
                         </div>
                         <div>
                           <p className="text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Monthly Expense</p>
                           <p className="text-xl font-bold text-red-600 dark:text-red-400">
                             - {isPrivacyMode ? maskText(appData.financeSummary?.expense || 0, 'amount') : `₹${(appData.financeSummary?.expense || 0).toLocaleString('en-IN')}`}
                           </p>
                         </div>
                       </div>
                    </div>
                  )}
                </BraveCard>

                <BraveCard colSpan={2} bgColor="bg-brave-blue dark:bg-[#162233]">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-2xl font-bold text-gray-900 dark:text-white">
                      Objectives
                    </h3>
                  </div>
                  
                  {isEditMode && (
                    <div className="flex flex-col sm:flex-row gap-2 mb-6">
                       <BraveInput value={newTask} onChange={e=>setNewTask(e.target.value)} onKeyPress={e=>e.key==='Enter'&&addTask()} placeholder="Add a new objective..." />
                       <div className="flex gap-2 w-full sm:w-auto shrink-0">
                          {editTaskId && <BraveButton variant="secondary" onClick={() => {setEditTaskId(null); setNewTask('');}}><X className="w-4 h-4"/></BraveButton>}
                          <BraveButton onClick={addTask}>{editTaskId ? <Check className="w-4 h-4" /> : <Plus className="w-4 h-4"/>}</BraveButton>
                       </div>
                    </div>
                  )}

                  <div className="space-y-3 flex-1 overflow-y-auto custom-scrollbar">
                    {(appData.tasks || []).map(task => (
                      <div key={task.id} className="flex items-center justify-between p-3 bg-white/60 dark:bg-black/20 border border-gray-200 dark:border-gray-700/50 rounded-xl hover:border-gray-400 dark:hover:border-gray-500 transition-colors group">
                        <div className="flex items-center gap-3">
                          <button

          // --- GENERIC LIST VIEW BUILDER (BRAVE THEMED) ---

              if(!formData[fields[0].key]) return;
              const payload = { ...formData };
              fields.forEach(f => {
                if (f.type === 'select' && !payload[f.key]) payload[f.key] = f.options[0].value;

              if (editId) {
                setAppData({...appData, [dataKey]: items.map(i => i.id === editId ? {...i, ...payload} : i)});
                setEditId(null);

                const newObj = { id: Date.now(), ...payload };

              setEditId(item.id);

                </div>
              </div>
            );

          // --- SPECIFIC VIEWS ---
          const FinanceView = () => {
             const calculateNextDate = (currentDateStr, cycle) => {
                let date = currentDateStr ? new Date(currentDateStr) : new Date();
                if (isNaN(date.getTime())) date = new Date(); 
                date.setHours(12, 0, 0, 0);
                if (cycle === '28 Days') date.setDate(date.getDate() + 28);
                else if (cycle === '1 Month') date.setMonth(date.getMonth() + 1);
                else if (cycle === '3 Months') date.setMonth(date.getMonth() + 3);
                else if (cycle === '1 Year') date.setFullYear(date.getFullYear() + 1);
                return date.toISOString().split('T')[0];
             };

             return <GenericListView 
              title="Financial Ledger" description="Track your bills and recurring payments privately." dataKey="bills"
              fields={[
                {key:'name', placeholder:'Billing Entity'}, 
                {key:'amount', type:'number', placeholder:'Amount (₹)'}, 
                {key:'dueDate', type:'date', placeholder:'Due Date'},
                {key:'cycle', type:'select', options: [
                  {value: 'None', label: 'One-Time'},
                  {value: '28 Days', label: '28 Days'},
                  {value: '1 Month', label: 'Monthly'},
                  {value: '3 Months', label: 'Quarterly'},
                  {value: '1 Year', label: 'Yearly'}

              renderCard={(item) => {

                        <Badge className={dueStatus.color}>{dueStatus.text}</Badge>

                         <Badge className="bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400">Cleared</Badge>
                      )}
                    </div>
                    <h3 className="text-xl font-bold text-gray-900 dark:text-white">{item.name}</h3>
                    <p className="text-3xl font-bold text-gray-900 dark:text-white mt-2 mb-1">
                      {maskText(item.amount, 'amount')}
                    </p>
                    {item.cycle && item.cycle !== 'None' && (
                      <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">
                        {item.cycle} Cycle
                      </span>
                    )}
                    <div className="mt-auto pt-6">
                      <p className="text-sm font-medium text-gray-600 dark:text-gray-400 mb-3">
                        Due: {new Date(item.dueDate).toLocaleDateString()}
                      </p>
                      {!item.paid && (
                        <BraveButton 
                          variant="secondary"
                          className="w-full justify-center"
                          onClick={(e) => {
                            e.stopPropagation();
                            let newBills;
                            if (item.cycle && item.cycle !== 'None') {
                              const nextDate = calculateNextDate(item.dueDate, item.cycle);
                              newBills = (appData.bills||[]).map(b => b.id === item.id ? {...b, dueDate: nextDate, paid: false} : b);
                            } else {
                              newBills = (appData.bills||[]).map(b => b.id === item.id ? {...b, paid: true} : b);
                            }
                            setAppData({...appData, bills: newBills});
                          }}
                        >
                          {item.cycle && item.cycle !== 'None' ? 'Mark Paid & Extend' : 'Mark as Cleared'}
                        </BraveButton>
                      )}
                    </div>
                  </BraveCard>
                )
              }}
            />
          }

          const LinksView = () => {
            const [newLink, setNewLink] = useState({ title: '', url: '', priority: 'normal' });
            const [editId, setEditId] = useState(null);

            const addLink = () => {
              if(!newLink.title || !newLink.url) return;
              let finalUrl = newLink.url.startsWith('http') ? newLink.url : `https://${newLink.url}`;
              if (editId) {
                setAppData({...appData, links: (appData.links||[]).map(l => l.id === editId ? {...l, title: newLink.title, url: finalUrl, priority: newLink.priority} : l)});
                setEditId(null);
              } else {
                const newObj = { id: Date.now(), title: newLink.title, url: finalUrl, priority: newLink.priority, completed: false };
                setAppData({...appData, links: [newObj, ...(appData.links || [])]});
              }
              setNewLink({ title: '', url: '', priority: 'normal' });

            const toggle = (id) => setAppData({...appData, links: (appData.links||[]).map(i => i.id === id ? {...i, completed: !i.completed} : i)});
            const remove = (id) => setAppData({...appData, links: (appData.links||[]).filter(i => i.id !== id)});

            return (
              <div className="space-y-8 animate-fade-in">
                <div className="max-w-3xl">

                {isEditMode && (

                      <BraveInput value={newLink.url} onChange={e=>setNewLink({...newLink, url: e.target.value})} placeholder="URL (e.g., github.com)" />
                      <select

                        onChange={e=>setNewLink({...newLink, priority: e.target.value})} 
                        className="bg-white dark:bg-[#1a1a1a] border border-gray-300 dark:border-gray-700 rounded-full px-5 py-3 text-gray-900 dark:text-white outline-none focus:border-brave-orange"
                      >
                        <option value="normal">Normal Priority</option>
                        <option value="high">Must Do (High)</option>
                      </select>
                      <div className="flex gap-2 shrink-0">
                         <BraveButton onClick={addLink}>

                    return (
                      <BraveCard key={item.id} className="relative group flex flex-col justify-between">

                            <button

                              className={`mt-1 w-6 h-6 shrink-0 rounded border flex items-center justify-center transition-colors ${item.completed ? 'bg-brave-orange border-brave-orange text-white' : 'border-gray-300 dark:border-gray-600 hover:border-gray-400 bg-white dark:bg-[#1a1a1a]'}`}
                            >
                              {item.completed && <Check className="w-4 h-4" strokeWidth={3} />}

                            <div>

                              <button onClick={() => remove(item.id)} className="p-2 text-red-400 hover:text-red-600"><Trash2 className="w-4 h-4"/></button>
                            </div>

                        >
                          <Globe className="w-4 h-4"/> Open Embedded
                        </BraveButton>
                      </BraveCard>
                    )
                  })}
                  {(appData.links || []).length === 0 && <div className="col-span-full py-12 text-center text-gray-500 bg-gray-50 dark:bg-[#1a1a1a] rounded-3xl border border-dashed border-gray-300 dark:border-gray-700 font-medium">No links assigned.</div>}
                </div>
              </div>
            );
          };

          const NewsView = () => {
            const [newsItems, setNewsItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [category, setCategory] = useState('TN');

            const categories = {
              'TN': { label: 'Tamil Nadu', query: 'தமிழ்நாடு' },
              'IN': { label: 'India', query: 'இந்தியா' },
              'WRLD': { label: 'World', query: 'உலகம்' },
              'TECH': { label: 'Technology', query: 'technology' }
            };

            useEffect(() => {
              const fetchNews = async () => {
                setLoading(true);
                try {
                  const rssUrl = encodeURIComponent(`https://news.google.com/rss/search?q=${categories[category].query}&hl=en-IN&gl=IN&ceid=IN:en`);
                  const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                  const data = await res.json();
                  if(data.status === 'ok') setNewsItems(data.items);
                } catch(e) {
                  console.error("Failed to fetch Live News", e);

                setLoading(false);
              };
              fetchNews();
            }, [category]);

            return (

                    <p className="mt-4 text-lg text-gray-600 dark:text-gray-400 font-medium">Stay updated without the annoyances. Clean, fast reading.</p>

                <div className="flex gap-3 overflow-x-auto custom-scrollbar pb-2">

            const [baseCurrency, setBaseCurrency] = useState('USD');
            const [targetCurrency, setTargetCurrency] = useState('INR');
            const [amount, setAmount] = useState(1);

            const CURRENCIES = {
              USD: { name: 'United States Dollar', flag: '🇺🇸' },
              INR: { name: 'Indian Rupee', flag: '🇮🇳' },
              EUR: { name: 'Euro', flag: '🇪🇺' },
              GBP: { name: 'British Pound', flag: '🇬🇧' },
              JPY: { name: 'Japanese Yen', flag: '🇯🇵' },
            };

            useEffect(() => {
              const fetchRates = async () => {
                try {
                  const res = await fetch(`https://open.er-api.com/v6/latest/${baseCurrency}`);
                  const data = await res.json();
                  if (data && data.rates) {
                    setRates(data.rates);
                    setDate(data.time_last_update_utc ? new Date(data.time_last_update_utc).toLocaleDateString() : new Date().toLocaleDateString());

                  console.error("Failed to fetch rates", e);
                  setRates({ USD: 1, INR: 83.50, EUR: 0.92, GBP: 0.79, JPY: 153.80 });

              };
              fetchRates();
            }, [baseCurrency]);

            const convertedAmount = (amount * (rates[targetCurrency] || 1)).toFixed(2);

            return (
              <div className="space-y-8 animate-fade-in max-w-4xl">
                 <div className="max-w-3xl">

                    <p className="mt-4 text-lg text-gray-600 dark:text-gray-400 font-medium">Fast, reliable currency conversion.</p>

                  <div className="flex items-center gap-3 md:gap-5">
                    {isEditMode && <Badge className="hidden md:flex bg-orange-100 text-orange-800 dark:bg-orange-900/30 dark:text-orange-400 border border-orange-200 dark:border-orange-800">Admin Mode</Badge>}
                    
                    <button onClick={() => setIsPrivacyMode(!isPrivacyMode)} className="hidden md:flex items-center gap-2 px-4 py-2 rounded-full border border-gray-200 dark:border-gray-700 text-sm font-semibold text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-[#1a1a1a] transition-all">
                      {isPrivacyMode ? <Shield className="w-4 h-4 text-brave-orange" /> : <Eye className="w-4 h-4" />}
                      {isPrivacyMode ? 'Private' : 'Public'}
                    </button>
                    
                    <div className="relative">
                      <button onClick={() => setIsNotificationsOpen(!isNotificationsOpen)} className="relative p-2.5 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors">
                        <Bell className="w-5 h-5" />
                        {notifications.length > 0 && <span className="absolute top-2 right-2 w-2.5 h-2.5 bg-brave-orange rounded-full border-2 border-white dark:border-[#0b0b0b]"></span>}
                      </button>

                      {isNotificationsOpen && (
                        <>
                          <div className="fixed inset-0 cursor-default" onClick={() => setIsNotificationsOpen(false)}></div>
                          <div className="absolute right-0 mt-3 w-80 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 rounded-2xl shadow-xl z-50 overflow-hidden animate-fade-in origin-top-right">
                            <div className="p-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-[#111]">
                              <h3 className="font-bold text-gray-900 dark:text-white text-sm">Notifications</h3>
                              <Badge className="bg-gray-200 text-gray-800 dark:bg-gray-700 dark:text-white">{notifications.length}</Badge>
                            </div>
                            <div className="max-h-[60vh] overflow-y-auto custom-scrollbar">
                              {notifications.length === 0 ? (
                                <div className="p-8 text-center text-gray-500 font-medium text-sm">You're all caught up.</div>
                              ) : (
                                notifications.map(notif => {
                                  const NIcon = notif.icon;
                                  return (
                                    <div key={notif.id} className="p-4 border-b border-gray-100 dark:border-gray-800/50 hover:bg-gray-50 dark:hover:bg-[#222] transition-colors flex gap-4 cursor-pointer" onClick={() => setIsNotificationsOpen(false)}>
                                      <div className="mt-1"><NIcon className={`w-5 h-5 ${notif.color}`} /></div>
                                      <div>
                                        <p className="text-sm font-bold text-gray-900 dark:text-white leading-tight mb-1">{notif.message}</p>
                                        <p className="text-xs font-medium text-gray-500">{notif.title} • {notif.time}</p>
                                      </div>
                                    </div>
                                  )
                                })
                              )}
                            </div>
                          </div>
                        </>
                      )}
                    </div>
                    
                    <div className="w-10 h-10 rounded-full bg-brave-orange text-white flex items-center justify-center font-bold text-lg shadow-sm">
                      {userName.charAt(0).toUpperCase()}
                    </div>
                  </div>
                </header>

                {/* Scrollable Content */}
                <div className="flex-1 overflow-y-auto p-4 md:p-8 lg:px-12 lg:py-10 pb-28 md:pb-20 custom-scrollbar relative z-10">
                  <div className="max-w-[1200px] mx-auto">
                    {renderContent()}
                  </div>
                </div>
              </main>

              {/* MOBILE BOTTOM NAVIGATION */}
              <nav className="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-white/90 dark:bg-[#0b0b0b]/90 backdrop-blur-lg border-t border-gray-200 dark:border-gray-800 pb-safe">
                <div className="flex items-center justify-around p-2">
                  {[
                    { id: 'dashboard', icon: LayoutDashboard, label: 'Hub' },
                    { id: 'links', icon: Globe, label: 'Tasks' },
                    { id: 'news', icon: Newspaper, label: 'News' },
                    { id: 'finance', icon: Receipt, label: 'Funds' },
                    { id: 'settings', icon: Settings, label: 'Sys' }
                  ].map(item => {
                    const Icon = item.icon;
                    const isActive = activeTab === item.id;
                    return (
                      <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex flex-1 flex-col items-center justify-center py-2 transition-colors ${isActive ? 'text-brave-orange' : 'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white'}`}>
                        <Icon className="w-6 h-6 mb-1" />
                        <span className="text-[10px] font-medium">{item.label}</span>
                      </button>
                    )
                  })}
                </div>
              </nav>

              {/* IFRAME MODAL */}
              {activeIframeUrl && (
                <div className="fixed inset-0 z-[100] bg-white dark:bg-[#0b0b0b] flex flex-col animate-fade-in">
                  <div className="h-16 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-4 bg-gray-50 dark:bg-[#111] z-10">
                    <div className="flex items-center gap-3 overflow-hidden">
                      <Shield className="w-5 h-5 text-brave-orange shrink-0" fill="currentColor" strokeWidth={0}/>
                      <span className="text-gray-900 dark:text-white font-medium truncate text-sm">{activeIframeUrl}</span>
                    </div>
                    <div className="flex items-center gap-3 shrink-0 pl-4">
                      <a href={activeIframeUrl} target="_blank" rel="noopener noreferrer" className="flex items-center gap-2 text-xs font-semibold text-gray-700 dark:text-gray-300 bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 px-4 py-2 rounded-full transition-colors">
                        <ExternalLink className="w-4 h-4"/> <span className="hidden md:inline">Open in App</span>
                      </a>
                      <button onClick={() => setActiveIframeUrl(null)} className="p-2 text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-full transition-colors">
                        <X className="w-5 h-5"/>
                      </button>
                    </div>
                  </div>
                  <div className="flex-1 w-full h-full relative bg-gray-100 dark:bg-gray-900">
                    <div className="absolute inset-0 flex flex-col items-center justify-center p-8 text-center z-0">
                      <Globe className="w-16 h-16 text-gray-300 dark:text-gray-700 mb-4"/>
                      <p className="text-gray-900 dark:text-white font-semibold text-lg mb-2">Connecting to secure frame...</p>
                      <p className="text-gray-500 text-sm max-w-md">If the target database refuses the embedded connection, please utilize the "Open in App" action above.</p>
                    </div>
                    <iframe 
                      src={activeIframeUrl} 
                      className="absolute inset-0 w-full h-full border-none z-10 bg-white dark:bg-transparent" 
                      sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
                      title="Internal Web Viewer"
                    ></iframe>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
